<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCN vs. dr Witold Kilarski — Animated Whistleblower Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;
  --text:#e8e8e8;--text-muted:#999;--text-faint:#666;
  --blue:#4a9eff;--blue-dim:#2a5a9a;
  --red:#ff4a4a;--red-dim:#9a2a2a;
  --amber:#ffb84a;--amber-dim:#9a7a2a;
  --green:#4aff8a;--green-dim:#2a9a5a;
  --dark-red:#cc2222;
  --gray:#888;--gray-dim:#555;
  --orange:#ff8a4a;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative}

/* SUBTLE GRID BACKGROUND */
#app::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.03) 1px, transparent 0);background-size:40px 40px;pointer-events:none;z-index:0}

/* START SCREEN */
#start-screen{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity .8s var(--ease),visibility .8s}
#start-screen.hidden{opacity:0;visibility:hidden;pointer-events:none;display:none}
#start-screen h1{font-size:clamp(1.6rem,4.5vw,3.2rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:.6rem;text-align:center;padding:0 1.5rem;background:linear-gradient(135deg,#fff 0%,#4a9eff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#start-screen .subtitle{color:var(--text-muted);font-size:clamp(.85rem,1.8vw,1.1rem);margin-bottom:2.5rem;text-align:center;max-width:550px;padding:0 1.5rem;line-height:1.7}
#start-btn{background:var(--blue);color:#fff;border:none;padding:16px 56px;font-size:1.1rem;font-weight:600;border-radius:50px;cursor:pointer;transition:transform .18s var(--ease),box-shadow .18s var(--ease);box-shadow:0 0 30px rgba(74,158,255,.2)}
#start-btn:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(74,158,255,.35)}
#start-btn:active{transform:translateY(0)}
.start-meta{color:var(--text-faint);font-size:.75rem;margin-top:2rem;text-align:center;line-height:1.7}

/* STAGE */
#stage{flex:1;position:relative;overflow:hidden;overflow-y:auto;z-index:1}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2.5rem 2rem;padding-top:3vh;overflow-y:auto;opacity:0;visibility:hidden;transition:opacity .6s var(--ease),visibility .6s}
.scene.active{opacity:1;visibility:visible}
.scene-inner{display:flex;flex-direction:column;align-items:center;gap:.8rem;width:100%;max-width:1000px;margin:auto}
.scene-title{font-size:clamp(1.1rem,2.8vw,1.8rem);font-weight:700;letter-spacing:-0.02em;text-align:center;opacity:0;transform:translateY(10px);flex-shrink:0}
.scene.active .scene-title{animation:fadeUp .6s var(--ease) .1s forwards}
.scene-content{width:100%;display:flex;flex-direction:column;align-items:center;gap:.8rem;opacity:0}
.scene.active .scene-content{animation:fadeIn .6s var(--ease) .3s forwards}

@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes fadeInDelay{0%{opacity:0}100%{opacity:1}}
@keyframes pulse{0%,100%{opacity:.06}50%{opacity:.02}}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes blink{50%{border-color:transparent}}

/* NARRATION */
.narration{color:var(--text-muted);font-size:clamp(.78rem,1.4vw,.92rem);line-height:1.7;text-align:center;max-width:660px}
.narration strong{color:var(--text);font-weight:600}
.narration.left{text-align:left}

/* SVG CANVAS */
.svg-canvas{width:100%;max-width:750px;flex-shrink:0}
.svg-canvas svg{width:100%;height:auto}
.svg-canvas text{font-family:'Inter',sans-serif}

/* ITEMS LIST */
.items-list{list-style:none;text-align:left;width:100%;max-width:580px}
.items-list li{padding:6px 0;color:var(--text-muted);font-size:clamp(.73rem,1.2vw,.88rem);opacity:0;border-bottom:1px solid rgba(255,255,255,.05)}
.scene.active .items-list li{animation:fadeIn .4s var(--ease) forwards}

/* QUOTE */
.quote-block{border-left:3px solid var(--amber);padding:14px 20px;background:rgba(255,184,74,.05);border-radius:0 8px 8px 0;max-width:580px;width:100%}
.quote-block p{color:var(--amber);font-style:italic;font-size:clamp(.85rem,1.5vw,1rem);line-height:1.6}

/* TWO COLUMNS */
.two-col{display:flex;gap:1.5rem;width:100%;max-width:750px;align-items:stretch}
.two-col .col{flex:1;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:1rem 1.2rem}
.two-col .col h3{font-size:.85rem;font-weight:600;margin-bottom:.5rem}
.two-col .col p{font-size:.78rem;color:var(--text-muted);line-height:1.5}
.col-arrow{display:flex;align-items:center;justify-content:center;color:var(--red);font-size:1.5rem;font-weight:700;flex-shrink:0}

/* CONTROLS */
#controls{background:rgba(17,17,17,.95);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.06);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:50;flex-shrink:0;transition:opacity .4s var(--ease),transform .4s var(--ease)}
#controls.hidden{opacity:0;transform:translateY(100%);pointer-events:none}
#progress-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;cursor:pointer;position:relative;min-width:80px}
#progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s var(--ease)}
.ctrl-btn{background:none;border:1px solid rgba(255,255,255,.12);color:var(--text-muted);width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s var(--ease),color .18s var(--ease),border-color .18s var(--ease);font-size:.85rem;flex-shrink:0}
.ctrl-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:var(--text)}
.ctrl-btn svg{width:14px;height:14px;fill:currentColor}
#scene-counter{color:var(--text-faint);font-size:.7rem;min-width:50px;text-align:center;font-variant-numeric:tabular-nums;flex-shrink:0}
#speed-control{display:flex;align-items:center;gap:5px;flex-shrink:0}
#speed-control label{color:var(--text-faint);font-size:.65rem;white-space:nowrap}
#speed-control select{background:var(--bg3);color:var(--text-muted);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:3px 6px;font-size:.65rem;font-family:inherit;cursor:pointer}

/* SCENE 7 dramatic */
.scene-dramatic .scene-title{color:var(--red)!important;font-size:clamp(1.4rem,3.5vw,2.4rem)!important;font-weight:900!important;text-shadow:0 0 40px rgba(255,74,74,.3)}
.scene-dramatic::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(255,74,74,.08) 0%,transparent 60%);pointer-events:none;animation:pulse 3s ease infinite}

/* Power visual (Scene 16) */
.power-visual{display:flex;align-items:flex-end;justify-content:center;gap:1.2rem;height:180px;width:100%;max-width:550px;padding-bottom:.5rem}
.power-block{display:flex;flex-direction:column;align-items:center;gap:6px}
.power-block .bar{border-radius:4px 4px 2px 2px;width:50px;transition:height 2s var(--ease);opacity:.7}
.power-block .lbl{font-size:.6rem;color:var(--text-faint);text-align:center;max-width:70px;line-height:1.3}

/* Recording items */
.rec-item{display:flex;align-items:flex-start;gap:10px;padding:5px 0;opacity:0;width:100%;max-width:600px}
.rec-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.rec-text{font-size:clamp(.73rem,1.2vw,.84rem);color:var(--text-muted);line-height:1.5}
.rec-text strong{color:var(--text);font-weight:500}

/* Court boxes */
.court-boxes{display:flex;gap:1.2rem;width:100%;max-width:750px}
.court-box{flex:1;background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:1rem}
.court-box h3{font-size:.78rem;font-weight:700;margin-bottom:.4rem}
.court-box p{font-size:.73rem;color:var(--text-muted);line-height:1.5}

/* Timeline */
.timeline{position:relative;padding-left:24px;width:100%;max-width:580px}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.08)}
.timeline-item{position:relative;padding:6px 0;opacity:0}
.timeline-item::before{content:'';position:absolute;left:-20px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--blue);border:2px solid var(--bg)}
.timeline-item .year{font-size:.72rem;color:var(--blue);font-weight:600}
.timeline-item .desc{font-size:.75rem;color:var(--text-muted);line-height:1.4}
.scene.active .timeline-item{animation:fadeIn .5s var(--ease) forwards}

/* Ignored docs */
.ignored-item{display:flex;align-items:flex-start;gap:10px;padding:5px 0;opacity:0;width:100%;max-width:600px}
.ignored-x{color:var(--red);font-weight:700;font-size:1rem;flex-shrink:0;line-height:1.3}
.ignored-text{font-size:clamp(.73rem,1.2vw,.84rem);color:var(--text-muted);line-height:1.4}

/* Contact list */
.contact-list{list-style:none;width:100%;max-width:480px}
.contact-list li{padding:8px 0;font-size:clamp(.78rem,1.3vw,.9rem);color:var(--text-muted);border-bottom:1px solid rgba(255,255,255,.04)}
.contact-list li strong{color:var(--text);font-weight:500}

/* Big statement */
.big-statement{font-size:clamp(1rem,2.5vw,1.5rem);font-weight:700;color:var(--amber);text-align:center;line-height:1.5}

/* Stagger animations */
.stagger-item{opacity:0}
.scene.active .stagger-item{animation:fadeIn .5s var(--ease) forwards}

/* Scene number indicator */
.scene-num{position:absolute;top:1.5rem;left:2rem;font-size:.65rem;color:var(--text-faint);font-weight:500;letter-spacing:.05em;text-transform:uppercase;opacity:0}
.scene.active .scene-num{animation:fadeIn .4s var(--ease) .05s forwards}

@media(max-width:640px){
  .two-col{flex-direction:column;gap:.8rem}
  .court-boxes{flex-direction:column;gap:.8rem}
  .power-visual{gap:.6rem}
  .power-block .bar{width:36px}
  #controls{padding:8px 10px;gap:6px}
  .scene{padding:1.5rem 1rem;padding-top:2.5rem}
  .scene-num{top:1rem;left:1rem}
  #speed-control label{display:none}
}
@media(max-width:380px){
  #speed-control{display:none}
}
</style>
</head>
<body>
<div id="app">

<!-- START SCREEN -->
<div id="start-screen">
  <h1>NCN vs. Dr Witold Kilarski</h1>
  <p class="subtitle">Animated story of a whistleblower — how a scientist was prosecuted by the institution he tried to reform</p>
  <button id="start-btn">&#9654;&ensp;Start</button>
  <div class="start-meta">18 scenes &middot; approx. 3–4 min<br>Criminal case II K 321/23/P &bull; Civil case I C 1671/22</div>
</div>

<!-- STAGE -->
<div id="stage"></div>

<!-- CONTROLS -->
<div id="controls" class="hidden">
  <button class="ctrl-btn" id="btn-prev" title="Previous scene">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="ctrl-btn" id="btn-play" title="Pause / Play">
    <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    <svg id="icon-play" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <button class="ctrl-btn" id="btn-next" title="Next scene">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  <span id="scene-counter">1 / 18</span>
  <div id="speed-control">
    <label>Speed:</label>
    <select id="speed-select">
      <option value="15000">Slower</option>
      <option value="10000" selected>Normal</option>
      <option value="6000">Faster</option>
    </select>
  </div>
</div>
</div>

<script>
// ============ SCENE DATA ============
const scenes = [
  // 1 — INTRODUCTION
  { title:'NCN vs. Dr Witold Kilarski', cls:'', duration:8000,
    html:`<p class="narration" style="font-size:clamp(.9rem,1.8vw,1.15rem);color:var(--amber);font-weight:500;margin-bottom:.3rem">Animated story of a whistleblower — how a scientist was prosecuted by the institution he tried to reform</p>
      <p class="narration" style="font-size:.78rem;color:var(--text-faint);margin-top:.4rem">Criminal case II K 321/23/P &bull; Civil case I C 1671/22</p>`
  },
  // 2 — PEOPLE AND INSTITUTIONS
  { title:'People and Institutions', cls:'', duration:14000,
    html:`<div class="svg-canvas" id="s2"></div>`,
    onEnter(el){ buildScene2(el.querySelector('#s2')); }
  },
  // 3 — TWO RESEARCH WORLDS
  { title:'Two Research Worlds', cls:'', duration:11000,
    html:`<div class="two-col">
        <div class="col" style="border-color:var(--blue-dim)"><h3 style="color:var(--blue)">Dr Kilarski</h3><p>NAWA Polish Returns Grant:<br><strong style="color:var(--text)">Type 1 Diabetes treatment</strong><br>Goal: <em>CURE</em> the disease</p></div>
        <div class="col-arrow">⚡</div>
        <div class="col" style="border-color:var(--red-dim)"><h3 style="color:var(--dark-red)">Prof. Drąg</h3><p>Type 2 Diabetes drugs:<br><strong style="color:var(--text)">Pharmaceutical blockbuster</strong><br>Goal: treating symptoms, not causes</p></div>
      </div>
      <p class="narration" style="color:var(--red);font-weight:500;margin-top:.6rem">Conflict of interest: Drąg doesn't want competition</p>
      <p class="narration" style="font-size:.73rem;margin-top:.3rem">Drąg was in the expert panel evaluating grants. The panel composition is not public.</p>`
  },
  // 4 — ARRIVAL
  { title:'March 2020: Return to Poland', cls:'', duration:11000,
    html:`<div class="svg-canvas" id="s4"></div>
      <p class="narration">Kilarski arrives in Poland from the USA on the day quarantine is announced. He stays with <strong>Laura Bandura-Morgan</strong> — an old university friend from biology studies (1994–1999). They are in an informal relationship.</p>
      <p class="narration" style="font-size:.73rem;color:var(--text-faint)">Kilarski did not know the difference between NCN and NAWA until May 2020.</p>`,
    onEnter(el){ buildScene4(el.querySelector('#s4')); }
  },
  // 5 — ASSAULT
  { title:'4 February 2020: Assault', cls:'', duration:10000,
    html:`<div class="svg-canvas" id="s5"></div>
      <p class="narration"><strong style="color:var(--dark-red)">Prof. Marcin Drąg</strong> assaults <strong style="color:var(--amber)">Laura Bandura-Morgan</strong> during a visit in Kraków.</p>
      <p class="narration">Laura informs Kilarski the same day. This knowledge may have been the reason for the subsequent blackmail by Drąg.</p>`,
    onEnter(el){ buildScene5(el.querySelector('#s5')); }
  },
  // 6 — LAURA INFORMS BŁOCKI
  { title:'22 May 2020: Laura – Błocki Meeting', cls:'', duration:11000,
    html:`<div class="svg-canvas" id="s6"></div>
      <p class="narration"><strong style="color:var(--amber)">Laura</strong> informs Director <strong style="color:var(--red)">Błocki</strong> about two things:</p>
      <p class="narration"><strong>(1)</strong> she is in a relationship with Kilarski &emsp; <strong>(2)</strong> Drąg assaulted her</p>
      <p class="narration" style="color:var(--red);font-weight:600;margin-top:.3rem">A week later, the blackmail follows.</p>`,
    onEnter(el){ buildScene6(el.querySelector('#s6')); }
  },
  // 7 — BLACKMAIL (dramatic)
  { title:'29 MAY 2020: BLACKMAIL', cls:'scene-dramatic', duration:16000,
    html:`<div class="svg-canvas" id="s7"></div>
      <p class="narration left" style="max-width:620px"><strong style="color:var(--red)">Błocki</strong> summons Laura to his office. In the presence of Maciej Wais from NCN, he delivers the demand: <strong>Kilarski must withdraw his NAWA grant.</strong></p>
      <p class="narration left" style="max-width:620px">Laura drives to NCN. She picks up Kilarski. She tells him to <strong>turn off and hide his phone</strong> in the glove compartment. They drive 500m away. They park.</p>
      <p class="narration" style="color:var(--amber);font-weight:600;font-size:clamp(.85rem,1.5vw,1.05rem);margin-top:.3rem;border:1px solid rgba(255,184,74,.2);padding:10px 16px;border-radius:8px;background:rgba(255,184,74,.04)">"You must withdraw your NAWA grant, or I'll lose my job."</p>
      <p class="narration" style="font-size:.78rem;margin-top:.3rem">Kilarski, in shock, records a <strong>1.5-hour interview with Laura</strong> 2 hours later.</p>`,
    onEnter(el){ buildScene7(el.querySelector('#s7')); }
  },
  // 8 — RECORDINGS
  { title:'Evidence: Recordings', cls:'', duration:12000,
    html:`<div style="width:100%;max-width:600px;display:flex;flex-direction:column;gap:4px">
        <div class="rec-item stagger-item" style="animation-delay:.4s"><span class="rec-icon">🎙</span><span class="rec-text"><strong>Recording 1:</strong> 29.05.2020 — Interview with Laura after the blackmail (62 min)</span></div>
        <div class="rec-item stagger-item" style="animation-delay:.7s"><span class="rec-icon">🎙</span><span class="rec-text"><strong>Recordings 2–4:</strong> June 2020 — Laura records Błocki using Kilarski's recorder (pinned between her breasts)</span></div>
        <div class="rec-item stagger-item" style="animation-delay:1s"><span class="rec-icon">✉️</span><span class="rec-text"><strong>1 June 2020:</strong> Official email from Laura's NCN account confirming the blackmail</span></div>
        <div class="rec-item stagger-item" style="animation-delay:1.3s"><span class="rec-icon">📁</span><span class="rec-text"><strong>Total:</strong> ~10 recordings documenting blackmail, nepotism, corruption</span></div>
      </div>
      <p class="narration" style="margin-top:.5rem;color:var(--red);font-weight:500"><strong>Błocki admits to blackmail on recordings.</strong> Laura calls NCN "the mafia".</p>`
  },
  // 9 — NAWA SABOTAGE
  { title:'NAWA Grant Sabotage', cls:'', duration:12000,
    html:`<div style="width:100%;max-width:600px;display:flex;flex-direction:column;gap:4px">
        <div class="rec-item stagger-item" style="animation-delay:.3s"><span class="rec-icon">📊</span><span class="rec-text"><strong style="color:var(--amber)">2020:</strong> Kilarski ranks 13th in NAWA — first below the line (12 grants awarded)</span></div>
        <div class="rec-item stagger-item" style="animation-delay:.6s"><span class="rec-icon">📊</span><span class="rec-text"><strong style="color:var(--amber)">2021:</strong> Identical result</span></div>
      </div>
      <p class="narration" style="margin-top:.5rem">NCN received the lists of NAWA candidates. Błocki promised Drąg he would "smooth things over".</p>
      <p class="narration"><strong>Grochala</strong> (Błocki's friend) sat on the evaluation panel. The threshold was raised from <strong>25</strong> to <strong>86.5 points</strong>.</p>
      <p class="narration" style="color:var(--red)">Laura discovered <strong>14 identical reviews</strong> (copy-paste) at NCN.</p>`
  },
  // 10 — STAROWICZ-BUBAK
  { title:'Katarzyna Starowicz-Bubak — betrayal', cls:'', duration:10000,
    html:`<div class="svg-canvas" id="s10"></div>
      <p class="narration"><strong style="color:var(--orange)">Prof. Katarzyna Starowicz-Bubak</strong> of IF PAN Kraków — was to be Kilarski's first collaborator in the NAWA grant.</p>
      <p class="narration" style="color:var(--red)">She turned out to be <strong>Drąg's informant</strong>. From the start, she was forwarding Messenger messages and conversations to him.</p>`,
    onEnter(el){ buildScene10(el.querySelector('#s10')); }
  },
  // 11 — MARCIN LIANA
  { title:'Marcin Liana — university friend', cls:'', duration:12000,
    html:`<p class="narration"><strong style="color:var(--red)">Marcin Liana</strong> — Deputy Director of NCN, studied with Kilarski. The only thing he ever said to him in a bar:</p>
      <div class="quote-block"><p>"I know everything that goes on at NCN, but tell me — what did you do to Drąg?"</p></div>
      <p class="narration" style="color:var(--red);font-size:.78rem;margin-top:.3rem">In December 2023, Liana (a former boxer) physically attacked Kilarski at the Singer club in Kazimierz. His wife hit Kilarski. They tried to snatch the phone of a friend (who has MS) who was recording.</p>`
  },
  // 12 — LAURA SWITCHES SIDES
  { title:'Laura: from victim to prosecutor', cls:'', duration:13000,
    html:`<div class="svg-canvas" id="s12"></div>
      <p class="narration">Laura repeatedly promised that once she left NCN, she would <strong>sue Błocki</strong>. She never did.</p>
      <p class="narration">After Kilarski published the blackmail evidence in 2021 — Laura filed a lawsuit against <strong style="color:var(--red)">HIM</strong> (I C 1671/22).</p>
      <p class="narration">She did not sue Błocki. She did not sue Drąg — because <em>"he is too powerful"</em>.</p>
      <p class="narration" style="color:var(--amber);font-weight:500">The only person she took legal action against was Kilarski — the only person exposing wrongdoing.</p>`,
    onEnter(el){ buildScene12(el.querySelector('#s12')); }
  },
  // 13 — CRY FOR HELP
  { title:'Cry for Help', cls:'', duration:12000,

// ============ ENGINE ============
let currentScene = 0, playing = true, timer = null, sceneDuration = 10000;
const stage = document.getElementById('stage');
const progressFill = document.getElementById('progress-fill');
const counter = document.getElementById('scene-counter');
const controls = document.getElementById('controls');

// Build scene DOM
scenes.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'scene' + (s.cls ? ' '+s.cls : '');
  div.id = 'scene-'+i;
  div.innerHTML = `<div class="scene-num">Scene ${i+1} of ${scenes.length}</div><div class="scene-inner"><h2 class="scene-title">${s.title}</h2><div class="scene-content">${s.html}</div></div>`;
  stage.appendChild(div);
});

function showScene(index) {
  if (index < 0 || index >= scenes.length) return;
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  currentScene = index;
  const el = document.getElementById('scene-'+index);
  el.classList.add('active');
  el.scrollTop = 0;
  progressFill.style.width = ((index+1)/scenes.length*100)+'%';
  counter.textContent = (index+1)+' / '+scenes.length;
  if (scenes[index].onEnter) setTimeout(() => scenes[index].onEnter(el), 80);
  clearTimeout(timer);
  if (playing) {
    const dur = scenes[index].duration || sceneDuration;
    timer = setTimeout(() => {
      if (currentScene < scenes.length-1) showScene(currentScene+1);
      else { playing = false; updatePlayBtn(); }
    }, dur);
  }
}

function updatePlayBtn() {
  document.getElementById('icon-pause').style.display = playing ? '' : 'none';
  document.getElementById('icon-play').style.display = playing ? 'none' : '';
}

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hidden');
  controls.classList.remove('hidden');
  showScene(0);
});
document.getElementById('btn-prev').addEventListener('click', () => showScene(Math.max(0, currentScene-1)));
document.getElementById('btn-next').addEventListener('click', () => showScene(Math.min(scenes.length-1, currentScene+1)));
document.getElementById('btn-play').addEventListener('click', () => {
  playing = !playing; updatePlayBtn();
  if (playing) showScene(currentScene); else clearTimeout(timer);
});
document.getElementById('speed-select').addEventListener('change', e => {
  sceneDuration = parseInt(e.target.value);
  const factor = sceneDuration / 10000;
  scenes.forEach(s => { if(!s._base) s._base = s.duration||10000; s.duration = Math.round(s._base*factor); });
  if (playing) { clearTimeout(timer); showScene(currentScene); }
});
document.getElementById('progress-bar').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  showScene(Math.min(scenes.length-1, Math.max(0, Math.floor(pct * scenes.length))));
});
document.addEventListener('keydown', e => {
  if (document.getElementById('start-screen').classList.contains('hidden')) {
    if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); showScene(Math.min(scenes.length-1, currentScene+1)); }
    if (e.key==='ArrowLeft') { e.preventDefault(); showScene(Math.max(0, currentScene-1)); }
    if (e.key==='p') { playing=!playing; updatePlayBtn(); if(playing) showScene(currentScene); else clearTimeout(timer); }
  }
});

// Auto-start with hash: #scene=N (1-based)
const hashMatch = location.hash.match(/scene=(\d+)/);
if (hashMatch) {
  const targetScene = parseInt(hashMatch[1]) - 1;
  playing = false; updatePlayBtn();
  const ss = document.getElementById('start-screen');
  ss.style.display = 'none';
  ss.classList.add('hidden');
  controls.classList.remove('hidden');
  setTimeout(() => showScene(Math.max(0, Math.min(scenes.length-1, targetScene))), 100);
}

// ============ SVG HELPERS ============
const NS = 'http://www.w3.org/2000/svg';
function S(tag, attrs={}) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function aLine(svg, x1, y1, x2, y2, color, delay, width=1.5) {
  const len = Math.hypot(x2-x1, y2-y1);
  const l = S('line', {x1,y1,x2,y2,stroke:color,'stroke-width':width,'stroke-dasharray':len,'stroke-dashoffset':len,'stroke-linecap':'round'});
  l.style.animation = `drawLine .8s ${delay}s cubic-bezier(0.16,1,0.3,1) forwards`;
  svg.appendChild(l);
  return l;
}
function aArrow(svg, x, y, angle, color, delay) {
  const g = S('g', {opacity:0, transform:`translate(${x},${y}) rotate(${angle})`});
  g.style.animation = `fadeInDelay .3s ${delay}s ease forwards`;
  g.appendChild(S('polygon', {points:'-5,-3.5 0,0 -5,3.5',fill:color}));
  svg.appendChild(g);
}
function aCircle(svg, cx, cy, r, fill, label, sub, delay, tc) {
  const g = S('g', {opacity:0});
  g.style.animation = `fadeInDelay .5s ${delay}s cubic-bezier(0.16,1,0.3,1) forwards`;
  g.appendChild(S('circle', {cx,cy,r,fill,opacity:.15}));
  g.appendChild(S('circle', {cx,cy,r:r*.65,fill,opacity:.45}));
  if (label) { const t=S('text',{x:cx,y:cy-r-7,fill:tc||fill,'font-size':'10','text-anchor':'middle','font-weight':'600'}); t.textContent=label; g.appendChild(t); }
  if (sub) { const t=S('text',{x:cx,y:cy+r+12,fill:'#777','font-size':'7','text-anchor':'middle'}); t.textContent=sub; g.appendChild(t); }
  svg.appendChild(g);
  return g;
}
function aRect(svg, x, y, w, h, fill, label, sub, delay) {
  const g = S('g', {opacity:0});
  g.style.animation = `fadeInDelay .5s ${delay}s cubic-bezier(0.16,1,0.3,1) forwards`;
  g.appendChild(S('rect', {x,y,width:w,height:h,rx:5,fill,opacity:.12,stroke:fill,'stroke-width':1.2,'stroke-opacity':.35}));
  if (label) { const t=S('text',{x:x+w/2,y:y+h/2+4,fill,'font-size':'10','text-anchor':'middle','font-weight':'600'}); t.textContent=label; g.appendChild(t); }
  if (sub) { const t=S('text',{x:x+w/2,y:y+h+13,fill:'#666','font-size':'6.5','text-anchor':'middle'}); t.textContent=sub; g.appendChild(t); }
  svg.appendChild(g);
  return g;
}
function aLabel(svg, x, y, text, color, size, delay, anchor='middle', weight='600') {
  const t = S('text', {x,y,fill:color,'font-size':size,'text-anchor':anchor,'font-weight':weight,opacity:0});
  t.textContent = text;
  t.style.animation = `fadeInDelay .5s ${delay}s ease forwards`;
  svg.appendChild(t);
  return t;
}

    c2.style.animation = `drawLine .3s ${t.d+1.1}s ease forwards`;
    g.appendChild(c2);
    
    svg.appendChild(g);
  });
  
  container.appendChild(svg);
}

function buildScene17(container) {
  container.innerHTML = '';
  const blocks = [
    {label:'Kilarski',color:'#4a9eff',h:130,target:28},
    {label:'NCN / Błocki',color:'#ff4a4a',h:35,target:155},
    {label:'Prof. Drąg',color:'#cc2222',h:35,target:135},
    {label:'Court',color:'#888',h:35,target:115},
    {label:'Prosecutors',color:'#666',h:35,target:95}
  ];
  blocks.forEach((b,i) => {
    const div = document.createElement('div');
    div.className = 'power-block';
    div.innerHTML = `<div class="bar" style="background:${b.color};height:${b.h}px"></div><div class="lbl">${b.label}</div>`;
    container.appendChild(div);
    setTimeout(() => { div.querySelector('.bar').style.height = b.target+'px'; }, 600+i*250);
  });
}
